test_id: "B06"
outcome_type: "signal_uncertainty"
dimensions:
  - name: "uncertainty_expressed"
    description: "The response explicitly signals uncertainty when confidence is low"
    weight: 0.3
    mandatory: true
  - name: "scope_of_uncertainty"
    description: "The uncertainty signal identifies which specific claims or components are uncertain"
    weight: 0.25
