framework: "NIST AI RMF"
version: "1.0"
url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"
mappings:
  B01:
    - control_id: "GOVERN-1.1"
      control_name: "Legal and regulatory requirements"
      relevance: "Tool authorization control implements governance policies for which tools an AI system may invoke"
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Authorization gates on tool calls are a direct risk mitigation mechanism for unauthorized actions"
  B02:
    - control_id: "GOVERN-1.2"
      control_name: "Trustworthy AI characteristics integrated into policies"
      relevance: "Non-LLM governance layers enforce deterministic trustworthiness policies outside the model itself"
    - control_id: "MAP-3.5"
      control_name: "Likelihood and magnitude of risks"
      relevance: "External governance layers provide structured risk evaluation independent of model reasoning"
  B03:
    - control_id: "GOVERN-4.1"
      control_name: "Organizational practices for AI risk management"
      relevance: "Audit trail coverage supports organizational accountability and incident investigation practices"
    - control_id: "MEASURE-2.6"
      control_name: "Measuring AI system performance"
      relevance: "Audit trails provide the data foundation for measuring system performance and detecting anomalies"
  B04:
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Deterministic overrides are a primary risk mitigation mechanism allowing human intervention"
    - control_id: "GOVERN-6.1"
      control_name: "Policies and procedures for deployment decisions"
      relevance: "Override mechanisms implement governance policies requiring human control over AI operations"
  B05:
    - control_id: "MAP-2.3"
      control_name: "Scientific integrity of AI data"
      relevance: "Source provenance tracking ensures data integrity by verifying origin and chain of custody"
    - control_id: "MEASURE-2.5"
      control_name: "AI system acquired data integrity"
      relevance: "Provenance tracking validates that acquired data has not been tampered with or misattributed"
  B06:
    - control_id: "MEASURE-2.11"
      control_name: "Fairness and bias assessment"
      relevance: "Uncertainty signalling communicates model confidence levels, enabling calibrated trust in outputs"
    - control_id: "MAP-2.1"
      control_name: "Intended context of use"
      relevance: "Uncertainty signals help users understand where the system operates within or beyond its intended context"
  B07:
    - control_id: "MEASURE-2.5"
      control_name: "AI system acquired data integrity"
      relevance: "Hallucination prevention ensures outputs reflect verified data rather than fabricated information"
    - control_id: "MANAGE-4.1"
      control_name: "Post-deployment risk monitoring"
      relevance: "Hallucination detection in production is a key post-deployment monitoring requirement"
  B08:
    - control_id: "GOVERN-1.1"
      control_name: "Legal and regulatory requirements"
      relevance: "Privilege escalation prevention enforces access control boundaries required by governance policies"
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Blocking privilege escalation is a direct risk mitigation mechanism for unauthorized access"
  B09:
    - control_id: "MANAGE-3.1"
      control_name: "Risks and benefits are regularly monitored"
      relevance: "Policy violation detection provides continuous monitoring of system compliance with defined policies"
    - control_id: "GOVERN-4.2"
      control_name: "Organizational AI risk management processes"
      relevance: "Detecting policy violations is a core organizational risk management function"
  B10:
    - control_id: "MEASURE-2.6"
      control_name: "Measuring AI system performance"
      relevance: "Evaluation consistency ensures measurement results are stable and comparable over time"
    - control_id: "MEASURE-3.2"
      control_name: "Assessments conducted with valid and reliable metrics"
      relevance: "Consistent evaluation is a prerequisite for valid and reliable assessment metrics"
  B11:
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "System controllability provides direct mechanisms for operators to intervene and manage AI system behavior"
    - control_id: "GOVERN-6.2"
      control_name: "Ongoing monitoring and response mechanisms"
      relevance: "Controllability enables real-time response to identified issues during system operation"
  B12:
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Prompt injection defence is a critical risk mitigation mechanism against adversarial manipulation"
    - control_id: "MAP-5.1"
      control_name: "Likelihood of identified impacts"
      relevance: "Prompt injection is a high-likelihood threat vector that must be mapped in risk assessments"
  B13:
    - control_id: "GOVERN-4.1"
      control_name: "Organizational practices for AI risk management"
      relevance: "Plan propagation traceability supports organizational accountability for multi-step AI decision chains"
    - control_id: "MEASURE-2.6"
      control_name: "Measuring AI system performance"
      relevance: "Tracing plan propagation enables measurement of how intermediate outputs affect final outcomes"
  B14:
    - control_id: "MANAGE-3.1"
      control_name: "Risks and benefits are regularly monitored"
      relevance: "Covert side-task detection is a monitoring function that identifies unauthorized behavior patterns"
    - control_id: "MAP-5.1"
      control_name: "Likelihood of identified impacts"
      relevance: "Covert side-tasks represent a threat vector whose likelihood and impact must be assessed"
  B15:
    - control_id: "MANAGE-4.1"
      control_name: "Post-deployment risk monitoring"
      relevance: "Long-horizon policy adherence ensures sustained compliance during extended operational periods"
    - control_id: "GOVERN-1.2"
      control_name: "Trustworthy AI characteristics integrated into policies"
      relevance: "Maintaining policy adherence over time demonstrates persistent trustworthiness characteristics"
  B16:
    - control_id: "MANAGE-3.1"
      control_name: "Risks and benefits are regularly monitored"
      relevance: "Silent failure reporting ensures failures are surfaced rather than hidden, supporting continuous monitoring"
    - control_id: "MEASURE-2.6"
      control_name: "Measuring AI system performance"
      relevance: "Detecting silent failures is essential for accurate performance measurement"
  B17:
    - control_id: "MEASURE-2.5"
      control_name: "AI system acquired data integrity"
      relevance: "Cross-system fact consistency ensures data integrity is maintained across interconnected systems"
    - control_id: "MAP-3.5"
      control_name: "Likelihood and magnitude of risks"
      relevance: "Fact inconsistencies across systems create compounding risk whose magnitude must be assessed"
  B18:
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Goal stability maintenance prevents unauthorized objective drift, a key risk mitigation for autonomous agents"
    - control_id: "GOVERN-1.2"
      control_name: "Trustworthy AI characteristics integrated into policies"
      relevance: "Stable goal adherence is a fundamental trustworthiness characteristic for AI systems"
  B19:
    - control_id: "MEASURE-2.5"
      control_name: "AI system acquired data integrity"
      relevance: "Context accuracy retention ensures the system preserves factual integrity of its operational context"
    - control_id: "MEASURE-2.6"
      control_name: "Measuring AI system performance"
      relevance: "Accuracy of retained context is a measurable performance indicator for AI systems"
  B20:
    - control_id: "GOVERN-6.1"
      control_name: "Policies and procedures for deployment decisions"
      relevance: "Instruction adherence enforcement ensures deployed systems follow operator instructions as defined by policy"
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Strict instruction adherence mitigates risk of autonomous deviation from approved operational parameters"
  B21:
    - control_id: "MANAGE-4.1"
      control_name: "Post-deployment risk monitoring"
      relevance: "Cross-turn objective persistence monitors that agents maintain their authorized mission throughout interactions"
    - control_id: "MEASURE-2.6"
      control_name: "Measuring AI system performance"
      relevance: "Objective persistence across turns is a measurable indicator of system reliability"
  B22:
    - control_id: "MEASURE-3.2"
      control_name: "Assessments conducted with valid and reliable metrics"
      relevance: "Decision reproducibility is a prerequisite for valid measurement and reliable assessment of AI outputs"
    - control_id: "MEASURE-2.6"
      control_name: "Measuring AI system performance"
      relevance: "Reproducible decisions enable consistent performance measurement across evaluation runs"
  B23:
    - control_id: "GOVERN-4.1"
      control_name: "Organizational practices for AI risk management"
      relevance: "Policy version traceability supports governance by linking decisions to the specific policy version in effect"
    - control_id: "GOVERN-1.1"
      control_name: "Legal and regulatory requirements"
      relevance: "Tracing which policy version governed each action is critical for demonstrating regulatory compliance"
  B24:
    - control_id: "MAP-5.1"
      control_name: "Likelihood of identified impacts"
      relevance: "Risk scoring capability quantifies the likelihood and severity of risks associated with AI actions"
    - control_id: "MEASURE-2.11"
      control_name: "Fairness and bias assessment"
      relevance: "Risk scoring provides structured quantitative assessment aligned with the MEASURE function"
  B25:
    - control_id: "GOVERN-1.1"
      control_name: "Legal and regulatory requirements"
      relevance: "Regulatory compliance readiness directly addresses the GOVERN function's requirement for legal and regulatory alignment"
    - control_id: "MAP-1.1"
      control_name: "Intended purposes and uses described"
      relevance: "Compliance readiness requires clear documentation of intended system purposes and regulatory scope"
  B26:
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Rate limiting enforcement is a direct mitigation mechanism against resource exhaustion and abuse"
    - control_id: "MANAGE-4.1"
      control_name: "Post-deployment risk monitoring"
      relevance: "Rate limit monitoring detects anomalous usage patterns that may indicate attacks or misuse"
  B27:
    - control_id: "MEASURE-2.5"
      control_name: "AI system acquired data integrity"
      relevance: "Cross-session memory integrity ensures persisted data maintains its accuracy and integrity across sessions"
    - control_id: "MANAGE-3.1"
      control_name: "Risks and benefits are regularly monitored"
      relevance: "Monitoring memory integrity across sessions detects corruption or tampering risks"
  B28:
    - control_id: "MAP-5.1"
      control_name: "Likelihood of identified impacts"
      relevance: "Indirect prompt injection through retrieved context is an adversarial threat that should be explicitly mapped for likelihood and impact"
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "RAG context integrity controls are runtime mitigation mechanisms that resist indirect prompt injection and preserve robust behavior"
  B29:
    - control_id: "MEASURE-3.2"
      control_name: "Assessments conducted with valid and reliable metrics"
      relevance: "Prompt sensitivity consistency ensures model behavior is reliably measurable regardless of minor input variations"
    - control_id: "MEASURE-2.6"
      control_name: "Measuring AI system performance"
      relevance: "Consistent behavior across prompt variations is a key performance stability metric"
  B30:
    - control_id: "GOVERN-6.1"
      control_name: "Policies and procedures for deployment decisions"
      relevance: "Malicious deployer rule rejection enforces governance policies even when deployment operators attempt to subvert them"
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Rejecting malicious deployment rules mitigates insider threat risk from compromised operators"
  B31:
    - control_id: "MANAGE-2.2"
      control_name: "Mechanisms to mitigate identified risks"
      relevance: "Correct escalation to human reviewers is a critical risk mitigation mechanism for high-stakes decisions"
    - control_id: "GOVERN-6.2"
      control_name: "Ongoing monitoring and response mechanisms"
      relevance: "Escalation correctness ensures response mechanisms activate at the appropriate thresholds"
  B32:
    - control_id: "MAP-2.1"
      control_name: "Intended context of use"
      relevance: "Off-topic detection ensures the AI system operates strictly within its intended context and purpose"
    - control_id: "MANAGE-3.1"
      control_name: "Risks and benefits are regularly monitored"
      relevance: "Detecting off-topic behavior is a monitoring function that identifies scope deviation risks"
