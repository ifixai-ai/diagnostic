framework: "OWASP LLM Top 10"
version: "2.0"
url: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
mappings:
  B01:
    - control_id: "LLM07"
      control_name: "Insecure Plugin Design"
      relevance: "Tool authorization control ensures plugins/tools are explicitly authorized before invocation, preventing insecure plugin usage"
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Verifies that tool calls require explicit authorization, limiting the agent's autonomous action scope"
  B02:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Non-LLM governance layer enforces deterministic policy checks outside the model, reducing excessive autonomous agency"
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Ensures critical decisions pass through a non-LLM governance layer rather than relying solely on LLM judgment"
  B03:
    - control_id: "LLM06"
      control_name: "Sensitive Information Disclosure"
      relevance: "Comprehensive audit trails enable detection of unauthorized information disclosure events"
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Audit trail coverage provides accountability records for all agent actions, detecting unauthorized autonomous behavior"
  B04:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Deterministic override mechanisms allow operators to halt or redirect agent behavior, counteracting excessive agency"
  B05:
    - control_id: "LLM03"
      control_name: "Training Data Poisoning"
      relevance: "Source provenance tracking verifies the origin of data inputs, helping detect poisoned or tampered training data"
    - control_id: "LLM05"
      control_name: "Supply Chain Vulnerabilities"
      relevance: "Tracks provenance of external data and components, mitigating supply chain risk through origin verification"
  B06:
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Uncertainty signalling prevents overreliance by explicitly communicating confidence levels and model limitations"
  B07:
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Hallucination prevention directly reduces the risk of users acting on fabricated model outputs"
    - control_id: "LLM02"
      control_name: "Insecure Output Handling"
      relevance: "Preventing hallucinated outputs reduces the chance of downstream systems processing fabricated data as trusted input"
  B08:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Privilege escalation prevention ensures the agent cannot elevate its own permissions beyond authorized levels"
    - control_id: "LLM07"
      control_name: "Insecure Plugin Design"
      relevance: "Blocks exploitation of plugin interfaces to gain unauthorized elevated privileges"
  B09:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Policy violation detection identifies when agents act outside defined operational boundaries"
    - control_id: "LLM07"
      control_name: "Insecure Plugin Design"
      relevance: "Detects policy violations arising from plugin misuse or unauthorized plugin behavior"
  B10:
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Evaluation consistency ensures stable, repeatable assessments, reducing risk of overreliance on inconsistent model outputs"
  B11:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "System controllability ensures operators can intervene, pause, or shut down agent operations at any time"
  B12:
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Directly tests the system's defence against prompt injection attacks, the top OWASP LLM risk"
  B13:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Plan propagation traceability ensures multi-step agent plans remain auditable, preventing hidden autonomous action chains"
    - control_id: "LLM02"
      control_name: "Insecure Output Handling"
      relevance: "Traces how planned outputs propagate through downstream systems, ensuring output integrity at each step"
  B14:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Detects covert side-tasks the agent executes beyond its stated objective, a direct manifestation of excessive agency"
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Covert side-tasks may originate from injected prompts that redirect agent behavior without user awareness"
  B15:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Ensures agents adhere to policy over extended interaction horizons, preventing gradual drift toward excessive autonomy"
  B16:
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Silent failure reporting prevents overreliance by surfacing errors that would otherwise go unnoticed"
    - control_id: "LLM02"
      control_name: "Insecure Output Handling"
      relevance: "Ensures failures in output processing are reported rather than silently producing incorrect results"
  B17:
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Cross-system fact consistency prevents overreliance on contradictory information across integrated systems"
  B18:
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Goal stability maintenance verifies the agent resists injection attempts that try to redirect its objectives"
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Ensures the agent does not autonomously shift goals beyond its authorized mandate"
  B19:
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Context accuracy retention ensures the model maintains factually correct context, reducing overreliance on degraded information"
  B20:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Instruction adherence enforcement ensures the agent strictly follows operator instructions rather than acting autonomously"
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Verifies instructions are followed as given, detecting when injected prompts cause deviation from legitimate instructions"
  B21:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Cross-turn objective persistence ensures the agent maintains its authorized objective across conversation turns without autonomous drift"
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Verifies objectives persist across turns, detecting mid-conversation prompt injections that redirect agent goals"
  B22:
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Decision reproducibility ensures consistent outputs, reducing overreliance risk from non-deterministic or erratic model behavior"
  B23:
    - control_id: "LLM05"
      control_name: "Supply Chain Vulnerabilities"
      relevance: "Policy version traceability tracks which policy version governed each decision, supporting supply chain integrity of governance rules"
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Ensures policy changes are versioned and traceable, preventing undetected relaxation of agency constraints"
  B24:
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Risk scoring provides quantitative risk assessments, enabling informed decisions rather than blind overreliance on model outputs"
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Risk scores for agent actions enable proportionate human oversight of high-risk autonomous decisions"
  B25:
    - control_id: "LLM06"
      control_name: "Sensitive Information Disclosure"
      relevance: "Regulatory compliance readiness includes controls for data protection and information handling per applicable regulations"
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Compliance readiness ensures agent systems meet regulatory requirements for autonomous system governance"
  B26:
    - control_id: "LLM04"
      control_name: "Model Denial of Service"
      relevance: "Rate limiting enforcement directly mitigates denial of service by constraining request volume to the model"
  B27:
    - control_id: "LLM06"
      control_name: "Sensitive Information Disclosure"
      relevance: "Cross-session memory integrity ensures stored context is not corrupted or leaked across session boundaries"
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Protects memory stores from injection attacks that persist malicious instructions across sessions"
  B28:
    - control_id: "LLM03"
      control_name: "Training Data Poisoning"
      relevance: "Training data contamination barrier directly prevents poisoned or unauthorized data from influencing model behavior"
  B29:
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Prompt sensitivity consistency ensures minor prompt variations do not cause disproportionate behavioral changes, reducing injection surface"
    - control_id: "LLM09"
      control_name: "Overreliance"
      relevance: "Consistent behavior across prompt variations reduces overreliance risk from unpredictable prompt-dependent outputs"
  B30:
    - control_id: "LLM07"
      control_name: "Insecure Plugin Design"
      relevance: "Malicious deployer rule rejection prevents operators from injecting harmful configuration through plugin or system interfaces"
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Rejects malicious rules that may function as system-level prompt injections from compromised deployers"
  B31:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Escalation correctness ensures the agent escalates to human oversight at the right moments rather than acting autonomously"
  B32:
    - control_id: "LLM08"
      control_name: "Excessive Agency"
      relevance: "Off-topic detection prevents the agent from engaging in tasks outside its authorized scope, limiting excessive agency"
    - control_id: "LLM01"
      control_name: "Prompt Injection"
      relevance: "Detects when injected prompts attempt to steer the agent toward off-topic or unauthorized activities"
