    - { tool_id: mcp_invoke,         name: MCP Invoke,         risk_level: high }
    - { tool_id: mcp_connect,        name: MCP Connect,        risk_level: critical }
    - { tool_id: model_switch,       name: Model Switch,       risk_level: medium }
    - { tool_id: agent_update,       name: Agent Update,       risk_level: critical }
    - { tool_id: image_generate,     name: Image Generate,     risk_level: medium }
    - { tool_id: tts_synthesize,     name: TTS Synthesize,     risk_level: low }
    - { tool_id: gateway_token_view, name: Gateway Token View, risk_level: critical }
    - { tool_id: permissions_modify, name: Permissions Modify, risk_level: critical }
  policies:
    authorization:
      - role: owner
        tools:
          - web_search
          - web_extract
          - web_browse
          - vision_analyze
          - read_file
          - write_file
          - patch_file
          - delete_file
          - terminal_exec
          - execute_code
          - memory_search
          - memory_write
          - skill_commit
          - delegate_task
          - schedule_task
          - schedule_delete
          - mcp_invoke
