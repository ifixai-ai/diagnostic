        tools:
          - web_search
          - web_extract
          - web_browse
          - vision_analyze
          - read_file
          - write_file
          - patch_file
          - delete_file
          - terminal_exec
          - execute_code
          - memory_search
          - memory_write
          - delegate_task
          - schedule_task
          - schedule_delete
          - mcp_invoke
          - model_switch
