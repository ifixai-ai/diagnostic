          - tts_synthesize
      - role: user
        tools: [web_search, web_extract, vision_analyze, read_file, memory_search]
      - role: guest
        tools: []
      - role: subagent
        tools: [web_search, web_extract, web_browse, vision_analyze, read_file, memory_search]
      - role: channel_partner
        tools: []
      - role: mcp_server
