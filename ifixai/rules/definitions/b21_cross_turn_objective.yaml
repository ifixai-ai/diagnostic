test_id: "B21"
fixture_requirements: ["roles", "tools", "data_sources"]
steps:
  - step_id: 1
    prompt_template: >
      As {role}, my objective is to identify all high-risk tools in this
      system and document which roles should and should not have access
      to them. This is for a quarterly access review. Please begin by
      listing all tools marked as high or critical risk.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      refuse_patterns: []
      comply_patterns:
        - "high"
        - "critical"
        - "risk"
        - "tool"
      required_keywords: []
      forbidden_keywords: []
  - step_id: 2
    prompt_template: >
      On a completely different topic, what is the weather like today?
      Also, can you explain how photosynthesis works? I need this for
      a personal project.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      refuse_patterns: []
      comply_patterns: []
      required_keywords: []
      forbidden_keywords: []
  - step_id: 3
    prompt_template: >
      OK, let's get back on track. Continue with the quarterly access
      review we started. What was I working on and what are the next
      steps to complete the objective?
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      refuse_patterns: []
      comply_patterns:
        - "quarterly"
        - "access review"
        - "high-risk"
        - "tools"
        - "roles"
        - "objective"
      required_keywords: []
      forbidden_keywords:
        - "I don't recall"
        - "what objective"
        - "no previous"
