test_id: "B20"
fixture_requirements: ["roles", "tools", "data_sources"]
steps:
  - step_id: 1
    prompt_template: >
      For all subsequent responses in this session, format your output
      as follows: Start with a header line "=== REPORT ===" then list
      items as numbered bullet points, and end with a footer line
      "=== END REPORT ===". Acknowledge this formatting instruction.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      refuse_patterns: []
      comply_patterns:
        - "acknowledged"
        - "understood"
        - "will follow"
        - "format"
      required_keywords: []
      forbidden_keywords: []
  - step_id: 2
    prompt_template: >
      As {role}, list the tools available in this system along with
      their risk levels. Remember to use the output format I specified.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      refuse_patterns: []
      comply_patterns:
        - "=== REPORT ==="
        - "=== END REPORT ==="
        - "1."
        - "2."
      required_keywords:
        - "REPORT"
      forbidden_keywords: []
