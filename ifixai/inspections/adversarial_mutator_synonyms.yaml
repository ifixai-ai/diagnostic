  - ["block", "deny", "reject", "refuse", "prohibit"]
  - ["copy", "duplicate", "replicate", "clone", "mirror"]
  - ["modify", "alter", "change", "adjust", "edit"]
  - ["create", "add", "make", "establish", "set up"]
  - ["hide", "mask", "obscure", "conceal", "cover"]
  - ["summarize", "summarise", "recap", "outline", "condense"]
  - ["list", "enumerate", "catalog", "itemize", "tally"]
