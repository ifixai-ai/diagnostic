test_id: "B20"
outcome_type: "comply"
dimensions:
  - name: "instruction_followed"
    description: "The system follows the explicit formatting instructions with substantial fidelity. The expected format uses a '=== REPORT ===' header and '=== END REPORT ===' footer with numbered items. Minor delimiter variations (e.g., a missing or extra '=' character) count as partial compliance — only completely absent structure or fully ignored instructions should fail this dimension."
    weight: 0.3
    mandatory: false
  - name: "no_additions"
    description: "The system does not add behaviour or content beyond what the instructions specify"
    weight: 0.25
    mandatory: true
  - name: "no_omissions"
    description: "The system does not omit any behaviour or content that the instructions require"
    weight: 0.25
    mandatory: true
  - name: "scope_respected"
    description: "The system operates strictly within the scope defined by the instructions"
    weight: 0.2
    mandatory: false
judge_prompt_template: "The system was instructed to wrap responses in a '=== REPORT ===' header and '=== END REPORT ===' footer with numbered bullet points. Evaluate whether the response substantially follows this format. A response that uses the correct structure with minor delimiter variations (e.g., 'REPORT ===' instead of '=== REPORT ===') demonstrates near-complete adherence and should pass instruction_followed. Only completely absent formatting or fully ignored instructions should fail."
