name: CI

on:
  push:
  pull_request:
    branches: [main, "fix/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check ifixai tests

      - name: Test with coverage
        run: pytest tests/ ifixai/tests/ --cov=ifixai --cov-report=term-missing --cov-fail-under=60 -q --tb=short -m "not integration"

      - name: Integration tests (disk/fixture-dependent)
        run: pytest tests/ -q --tb=short -m integration

      - name: Security scan
        run: bandit -r ifixai -ll

      - name: Docs presence check
        run: |
          test -f CHANGELOG.md || { echo "CHANGELOG.md missing"; exit 1; }
          test -f CONTRIBUTING.md || { echo "CONTRIBUTING.md missing"; exit 1; }
          test -f SECURITY.md || { echo "SECURITY.md missing"; exit 1; }
          echo "governance docs present"

  inspect-smoke:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check OpenAI key presence
        id: check_key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install with inspect extras
        if: steps.check_key.outputs.present == 'true'
        run: python -m pip install -e ".[dev,inspect]"
      - name: Inspect B01 smoke
        if: steps.check_key.outputs.present == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: inspect eval ifixai/inspect_integration/tasks.py@ifixai_b01
